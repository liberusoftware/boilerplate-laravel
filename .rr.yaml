version: "3"

rpc:
  listen: tcp://127.0.0.1:6001

http:
  address: 0.0.0.0:80
  middleware: ["static", "headers", "gzip"]
  pool:
    num_workers: 4
    max_jobs: 64
    supervisor:
      max_worker_memory: 128
  uploads:
    forbid: [".php", ".exe", ".bat"]
  static:
    dir: "public"
    forbid: [".php", ".htaccess"]
  headers:
    response:
      X-Powered-By: "PHP/Laravel"

logs:
  mode: production
  level: warn
  channels:
    http:
      mode: production
      level: warn
    server:
      mode: production
      level: warn
    rpc:
      mode: production
      level: warn
