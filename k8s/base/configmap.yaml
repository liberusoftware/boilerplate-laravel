apiVersion: v1
kind: ConfigMap
metadata:
  name: boilerplate-config
  namespace: boilerplate-laravel
  labels:
    app: boilerplate-laravel
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "info"
  DB_CONNECTION: "mysql"
  DB_HOST: "boilerplate-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "liberu"
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  REDIS_HOST: "boilerplate-redis"
  REDIS_PORT: "6379"
  OCTANE_SERVER: "roadrunner"
  BROADCAST_CONNECTION: "reverb"
  FILESYSTEM_DISK: "local"
