apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: boilerplate-mysql
  namespace: boilerplate-laravel
  labels:
    app: boilerplate-laravel
    component: mysql
spec:
  serviceName: boilerplate-mysql
  replicas: 1
  selector:
    matchLabels:
      app: boilerplate-laravel
      component: mysql
  template:
    metadata:
      labels:
        app: boilerplate-laravel
        component: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: boilerplate-config
              key: DB_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: boilerplate-secrets
              key: DB_USERNAME
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: boilerplate-secrets
              key: DB_PASSWORD
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: boilerplate-secrets
              key: DB_ROOT_PASSWORD
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command: [mysqladmin, ping, -h, localhost]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: [mysqladmin, ping, -h, localhost]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: boilerplate-mysql
  namespace: boilerplate-laravel
  labels:
    app: boilerplate-laravel
    component: mysql
spec:
  type: ClusterIP
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
  selector:
    app: boilerplate-laravel
    component: mysql
