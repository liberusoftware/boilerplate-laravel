apiVersion: v1
kind: Secret
metadata:
  name: boilerplate-secrets
  namespace: boilerplate-laravel
  labels:
    app: boilerplate-laravel
type: Opaque
stringData:
  # Generate with: php artisan key:generate --show
  APP_KEY: "base64:REPLACE_WITH_ACTUAL_KEY"
  DB_USERNAME: "liberu"
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  DB_ROOT_PASSWORD: "REPLACE_WITH_SECURE_ROOT_PASSWORD"
  REDIS_PASSWORD: ""
  # Socialstream OAuth providers
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  FACEBOOK_CLIENT_ID: ""
  FACEBOOK_CLIENT_SECRET: ""
# Production: use External Secrets Operator or Sealed Secrets
