apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: boilerplate-network-policy
  namespace: boilerplate-laravel
  labels:
    app: boilerplate-laravel
spec:
  podSelector:
    matchLabels:
      app: boilerplate-laravel
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8000
  - from:
    - podSelector:
        matchLabels:
          app: boilerplate-laravel
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 3306
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: boilerplate-laravel
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
